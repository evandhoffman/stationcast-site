<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#152d4a"/>
      <stop offset="42%"  stop-color="#1c5280"/>
      <stop offset="80%"  stop-color="#3a80b8"/>
      <stop offset="100%" stop-color="#5499cc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="60" y="70" width="420" height="490" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric glow -->
  <circle cx="1080" cy="60" r="320" fill="rgba(120,190,255,0.18)" filter="url(#glow)"/>

  <!-- App preview glass card -->
  <rect x="60" y="70" width="420" height="490" rx="28"
        fill="rgba(255,255,255,0.10)"
        stroke="rgba(255,255,255,0.22)" stroke-width="1"/>

  <!-- Location name -->
  <text x="270" y="170"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" fill="white" text-anchor="middle">Potts Point</text>

  <!-- Station meta -->
  <text x="270" y="198"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="15" fill="rgba(255,255,255,0.62)" text-anchor="middle">INSWPOTT2  ·  11:22 am  ·  2m ago</text>

  <!-- Temperature -->
  <text x="270" y="318"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="112" font-weight="200" fill="white" text-anchor="middle">69°</text>

  <!-- Condition -->
  <text x="270" y="362"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" fill="white" text-anchor="middle">Clear</text>

  <!-- H/L -->
  <text x="270" y="395"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="16" fill="rgba(255,255,255,0.62)" text-anchor="middle">73° / 62°  today so far</text>

  <!-- Metric cards row -->
  <!-- Humidity -->
  <rect x="80" y="420" width="185" height="112" rx="16"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="100" y="448"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" fill="rgba(255,255,255,0.62)" letter-spacing="0.8">HUMIDITY</text>
  <text x="100" y="488"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="300" fill="white">61%</text>
  <text x="100" y="516"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)">Dew point 56°</text>

  <!-- Wind -->
  <rect x="275" y="420" width="185" height="112" rx="16"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="295" y="448"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600" fill="rgba(255,255,255,0.62)" letter-spacing="0.8">WIND</text>
  <text x="295" y="488"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="34" font-weight="300" fill="white">6 mph</text>
  <text x="295" y="516"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)">Gusts 13 mph</text>

  <!-- Right side: branding -->
  <text x="560" y="210"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="62" font-weight="700" fill="white" letter-spacing="-1">StationCast</text>

  <text x="560" y="278"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400" fill="rgba(255,255,255,0.88)">Weather that feels</text>
  <text x="560" y="318"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400" fill="rgba(255,255,255,0.88)">like a place.</text>

  <text x="560" y="390"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.60)">Real readings from the station near you.</text>
  <text x="560" y="418"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" fill="rgba(255,255,255,0.60)">Not a forecast. Not a blend.</text>

  <!-- Beta pill -->
  <rect x="560" y="455" width="140" height="38" rx="19"
        fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <text x="630" y="479"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="0.5">PUBLIC BETA</text>

  <!-- Domain -->
  <text x="560" y="575"
        font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="19" fill="rgba(255,255,255,0.42)">stationcast.app</text>
</svg>
