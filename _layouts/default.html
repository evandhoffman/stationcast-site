<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - StationCast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f9f9f9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: white;
            min-height: 100vh;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #000;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        main {
            line-height: 1.8;
            color: #333;
        }

        h1 { font-size: 28px; margin: 30px 0 15px 0; }
        h2 { font-size: 22px; margin: 25px 0 12px 0; }
        h3 { font-size: 18px; margin: 20px 0 10px 0; }

        p { margin-bottom: 15px; }

        ul, ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        li { margin-bottom: 8px; }

        strong { font-weight: 600; }

        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: "Monaco", "Courier New", monospace;
            font-size: 14px;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }

        .last-updated {
            color: #999;
            font-size: 13px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>StationCast</h1>
            <p>Privacy Policy & Legal Documentation</p>
        </header>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>&copy; 2026 StationCast. All rights reserved.</p>
            <p><a href="https://github.com/evandhoffman/stationcast-site">Source on GitHub</a></p>
        </footer>
    </div>
</body>
</html>
